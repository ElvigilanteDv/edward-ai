<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edward AI - Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-layout">
        
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>Edward AI</h2>
                <button id="new-chat-btn" class="btn-new-chat">+ Nuevo Chat</button>
            </div>
            <div id="chats-list" class="chats-list">
                <div class="chat-tab active">Chat Predeterminado</div>
            </div>
            <div class="sidebar-footer">
                <button id="logout-btn" class="btn-logout">Cerrar Sesión</button>
            </div>
        </aside>

        <main class="chat-main-area">
            <header class="chat-topbar">
                <h3 id="current-chat-title">Chat Predeterminado</h3>
            </header>

            <div id="chat-messages" class="chat-box">
                <div class="message system-message">Bienvenido a Edward AI, la interfaz principal está lista. ¿Qué vamos a desarrollar hoy?</div>
            </div>

            <form id="chat-form" class="chat-input-area">
                <label for="file-input" class="btn-file">
                    📁
                    <input type="file" id="file-input" accept="image/*" style="display: none;">
                </label>
                <input type="text" id="chat-input" placeholder="Pregúntale algo a Edward AI u organiza tus archivos..." autocomplete="off" required>
                <button type="submit" class="btn-send">Enviar</button>
            </form>
            <div id="file-preview-container" class="file-preview hidden"></div>
        </main>

    </div>

    <script>
        if (!localStorage.getItem('token')) {
            window.location.href = 'login.html';
        }
        document.getElementById('logout-btn').addEventListener('click', () => {
            localStorage.removeItem('token');
            window.location.href = 'login.html';
        });
    </script>
    <script src="app.js"></script>
</body>
</html>
