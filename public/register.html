<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Edward AI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="auth-container">
        <div class="card">
            <h2>Crear Cuenta en Edward AI</h2>
            <form id="register-form">
                <input type="text" id="register-name" placeholder="Tu Nombre" required>
                <input type="email" id="register-email" placeholder="Correo electrónico" required>
                <input type="password" id="register-password" placeholder="Contraseña (mín. 6 caracteres)" required>
                <button type="submit" class="btn">Registrarse</button>
            </form>
            <p>¿Ya tienes cuenta? <a href="login.html" class="link">Inicia sesión aquí</a></p>
        </div>
    </div>
    <script>
        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('register-name').value;
            const email = document.getElementById('register-email').value;
            const password = document.getElementById('register-password').value;

            try {
                const res = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password })
                });
                const data = await res.json();
                if (res.ok) {
                    alert('Cuenta creada con éxito. Iniciando sesión...');
                    localStorage.setItem('token', data.token);
                    window.location.href = 'index.html';
                } else {
                    alert(data.message || 'Error al registrarse');
                }
            } catch (err) {
                alert('Error al conectar con el servidor');
            }
        });
    </script>
</body>
      </html>
